name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm run test

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install root deps (validate script)
        run: npm ci
      - name: Validate public env contract
        env:
          NEXT_PUBLIC_RPC_URL: https://ethereum-sepolia-rpc.publicnode.com
          NEXT_PUBLIC_FACTORY_ADDRESS: "0x0000000000000000000000000000000000000001"
          NEXT_PUBLIC_EXPLORER_URL: https://sepolia.etherscan.io
          GROQ_API_KEY: ci-placeholder-not-used-for-build
        run: npm run validate:web-env
      - name: Install web deps
        working-directory: web
        run: npm ci
      - name: Lint web
        working-directory: web
        run: npm run lint
      - name: Typecheck web
        working-directory: web
        run: npm run typecheck
      - name: Build web with placeholder public env
        working-directory: web
        env:
          NEXT_PUBLIC_RPC_URL: https://ethereum-sepolia-rpc.publicnode.com
          NEXT_PUBLIC_FACTORY_ADDRESS: "0x0000000000000000000000000000000000000001"
          NEXT_PUBLIC_EXPLORER_URL: https://sepolia.etherscan.io
          GROQ_API_KEY: ci-placeholder-not-used-for-build
        run: npm run build
